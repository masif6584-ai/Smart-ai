<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Smart Printing & Online Services</title>

<meta name="description" content="Smart Printing Online Services Kanganpur One Window Solution">
<meta name="keywords" content="Printing, NADRA, FBR, Website Development, Online Services Pakistan">

<!-- Libraries -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

html{scroll-behavior:smooth}

body{
font-family:Segoe UI,sans-serif;
background:#0f172a;
color:white;
transition:.4s;
}

/* Gradient Heading */
.gradient-text{
background:linear-gradient(45deg,#25D366,#00f2fe,#ff00ff);
background-size:200% 200%;
-webkit-background-clip:text;
color:transparent;
animation:gradientMove 4s infinite alternate;
}

@keyframes gradientMove{
0%{background-position:left}
100%{background-position:right}
}

/* Glass Cards */
.glass{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:25px;
padding:40px;
border:1px solid rgba(255,255,255,0.1);
}

/* Floating Panel */
.pro-floating{
position:fixed;
bottom:25px;
right:25px;
z-index:999;
display:flex;
flex-direction:column;
gap:15px;
}

/* Modal */
.pro-modal{
background:rgba(0,0,0,.95);
backdrop-filter:blur(20px);
}

.thumb-active{
border:2px solid #25D366!important;
transform:scale(1.15);
}

.light-mode{
background:#f4f4f4!important;
color:#111!important;
}

</style>
</head>

<body>

<!-- Particle Background -->
<div id="particles-js"></div>

<!-- Navbar -->
<nav class="navbar navbar-dark fixed-top" style="background:rgba(0,0,0,.6);backdrop-filter:blur(12px)">
<div class="container">

<a class="navbar-brand text-success fw-bold">
Smart Printing
<span class="d-block text-white small">One Window Solution</span>
</a>

</div>
</nav>

<!-- Hero Section -->
<section class="vh-100 d-flex align-items-center justify-content-center text-center p-4">

<div class="glass animate__animated animate__zoomIn">

<h1 class="display-4 fw-bold gradient-text">
Smart Printing & Online Services
</h1>

<p class="text-info fw-bold mt-3">
One Window Digital Business Solution
</p>

<div id="clock" class="mt-3 text-warning fw-bold"></div>

<button class="btn btn-success rounded-pill px-5 mt-4"
onclick="openGallery()">
📷 View Services Gallery
</button>

<br><br>

<button class="btn btn-outline-info rounded-pill px-5"
onclick="toggleTheme()">
🌙 Theme Change
</button>

</div>
</section>

<!-- Gallery Modal -->
<div id="galleryModal" class="fixed inset-0 z-[110] hidden pro-modal animate__animated animate__fadeIn">

<button onclick="closeGallery()"
class="absolute top-5 right-6 text-white text-5xl">&times;</button>

<div class="h-full flex flex-col items-center justify-center p-4">

<img id="mainSlide"
class="w-full max-w-5xl h-[70vh] object-contain rounded-2xl shadow-2xl">

<div id="thumbContainer"
class="mt-6 flex gap-3 overflow-x-auto max-w-5xl p-3 no-scrollbar"></div>

</div>
</div>

<!-- Floating Controls -->
<div class="pro-floating">

<button onclick="openGallery()"
class="bg-blue-600 text-white p-4 rounded-full shadow-xl">
📷
</button>

<button onclick="toggleTheme()"
class="bg-purple-600 text-white p-4 rounded-full shadow-xl">
🌙
</button>

<a href="https://wa.me/923XXXXXXXXX"
class="bg-green-600 text-white p-4 rounded-full shadow-xl">
<i class="fab fa-whatsapp"></i>
</a>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>

/* Theme Memory */
if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light-mode");
}

function toggleTheme(){
document.body.classList.toggle("light-mode");

localStorage.setItem(
"theme",
document.body.classList.contains("light-mode")?"light":"dark"
);
}

/* Clock */
setInterval(()=>{
document.getElementById("clock").innerText=
new Date().toLocaleTimeString();
},1000);

/* Gallery System */

const galleryImages=[
"IMG-20260222-WA0024.jpg",
"IMG-20260222-WA0028.jpg",
"IMG-20260223-WA0055.jpg",
"IMG-20260224-WA0019.jpg",
"IMG-20260225-WA0028.jpg",
"IMG-20260301-WA0097.jpg"
];

let currentIdx=0;
let autoPlay;

function openGallery(){
document.getElementById("galleryModal").classList.remove("hidden");
document.body.style.overflow="hidden";

renderThumbs();
startAutoPlay();
}

function closeGallery(){
document.getElementById("galleryModal").classList.add("hidden");
document.body.style.overflow="auto";
clearInterval(autoPlay);
}

function renderThumbs(){

const container=document.getElementById("thumbContainer");

container.innerHTML=galleryImages.map((img,i)=>
`<img src="${img}"
onclick="selectImage(${i})"
class="h-16 min-w-[100px] object-cover rounded-lg cursor-pointer transition-all
${i===currentIdx?'thumb-active':'opacity-50 hover:opacity-100'}">`
).join('');

document.getElementById("mainSlide").src=galleryImages[currentIdx];
}

function selectImage(i){
currentIdx=i;
renderThumbs();
}

function startAutoPlay(){
autoPlay=setInterval(()=>{
currentIdx=(currentIdx+1)%galleryImages.length;
renderThumbs();
},5000);
}

document.addEventListener("keydown",e=>{
if(e.key==="Escape") closeGallery();
});

particlesJS("particles-js",{
particles:{
number:{value:60},
color:{value:"#25D366"},
move:{speed:2}
}
});

</script>

</body>
</html>
