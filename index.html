<script>
particlesJS("particles-js",{particles:{number:{value:120}}});

function updateClock(){
const now=new Date();
const s=now.getSeconds();
const m=now.getMinutes();
const h=now.getHours();

document.getElementById('sec').style.transform=`translateX(-50%) rotate(${s*6}deg)`;
document.getElementById('min').style.transform=`translateX(-50%) rotate(${m*6}deg)`;
document.getElementById('hour').style.transform=`translateX(-50%) rotate(${h*30+m/2}deg)`;
}
setInterval(updateClock,1000);
updateClock();

let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
e.preventDefault();
deferredPrompt=e;
});

document.getElementById('installBtn').addEventListener('click',()=>{
if(deferredPrompt) deferredPrompt.prompt();
});
</script>
