<style>

body{

/* CLOCK */
.clock{

border-radius:50%;

.clock img{
position:absolute;

left:50%;

.num{

width:100%;
height:100%;

.hand{

.hour{width:6px;height:60px;background:#00e5ff;}
.min{width:4px;height:90px;background:#fff;}

/* SOCIAL */

}
.social-box a{color:white;transition:.3s;}
.social-box a:hover{color:var(--primary);transform:scale(1.2);}

/* FLOAT */
.wa-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:65px;height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
}

/* MAP */
.map-box{
border-radius:20px;
overflow:hidden;
border:2px solid var(--primary);
box-shadow:0 0 20px rgba(37,211,102,0.3);

<script>
AOS.init();

// PARTICLES
particlesJS("particles-js", {
particles:{number:{value:120},size:{value:2},move:{speed:1}}
});

// CLOCK NUMBERS
const clock=document.getElementById("clock");
for(let i=1;i<=12;i++){
let d=document.createElement("div");
d.className="num";
d.style.transform=`rotate(${i*30}deg)`;
d.innerHTML=`<span style="display:inline-block;transform:rotate(-${i*30}deg)">${i}</span>`;
clock.appendChild(d);
}

// CLOCK
function updateClock(){
let now=new Date();
let s=now.getSeconds();
let m=now.getMinutes();
let h=now.getHours();

sec.style.transform=`rotate(${s*6}deg)`;
min.style.transform=`rotate(${m*6}deg)`;
hour.style.transform=`rotate(${h*30+m/2}deg)`;
}
setInterval(updateClock,1000);

// WHATSAPP
function send(){
let val=document.getElementById("service").value;
window.open(`https://wa.me/923034480404?text=I need ${val}`);
}

// VISITOR (DEMO)
let c=localStorage.getItem("v")||0;
c++;
localStorage.setItem("v",c);
document.querySelector(".visitors").innerText=c;
</script>
