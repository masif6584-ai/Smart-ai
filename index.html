<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Smart Printing & Online Services | One Window Solution</title>

<meta name="description" content="Smart Printing Online Services Kanganpur One Window Solution">
<meta name="keywords" content="Printing, NADRA, FBR, Website Development, Online Services Pakistan">

<!-- Libraries -->
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

/* GLOBAL */

html{
scroll-behavior:smooth;
}

body{
font-family:Segoe UI,sans-serif;
background:#0f172a;
color:white;
transition:.4s;
}

/* Gradient Text */

.gradient-text{
background:linear-gradient(45deg,#25D366,#00f2fe,#ff00ff);
background-size:200% 200%;
-webkit-background-clip:text;
color:transparent;
animation:gradientMove 4s infinite alternate;
}

@keyframes gradientMove{
0%{background-position:left}
100%{background-position:right}
}

/* Floating Panel */

.global-floating{
position:fixed;
bottom:25px;
right:25px;
z-index:9999;
display:flex;
flex-direction:column;
gap:18px;
}

/* Modal Gallery */

.pro-modal{
background:rgba(0,0,0,.95);
backdrop-filter:blur(20px);
}

.thumb-active{
border:2px solid #25D366!important;
transform:scale(1.15);
}

/* Light Mode */

.light-mode{
background:#f4f4f4!important;
color:#111!important;
}

</style>

</head>

<body>

<!-- Particle Background -->
<div id="particles-js"></div>

<!-- HERO SECTION -->

<section class="vh-100 d-flex align-items-center justify-content-center text-center p-4">

<div class="animate__animated animate__zoomIn">

<h1 class="display-4 fw-bold gradient-text">
Smart Printing & Online Services
</h1>

<p class="text-info fw-bold mt-3">
One Window Digital Business Solution
</p>

<div id="clock" class="mt-3 text-warning fw-bold"></div>

<button class="btn btn-success rounded-pill px-5 mt-4"
onclick="openGallery()">
📷 View Services Gallery
</button>

<br><br>

<button class="btn btn-outline-info rounded-pill px-5"
onclick="toggleTheme()">
🌙 Theme Change
</button>

</div>

</section>

<!-- COUNTER SECTION -->

<section class="py-5 text-center bg-dark bg-opacity-25">

<div class="container">

<div class="row">

<div class="col-md-4 mb-4">
<div class="counter visitors">0</div>
<p>Total Page Visits</p>
</div>

<div class="col-md-4 mb-4">
<div class="counter" data-target="35">0</div>
<p>Services Offered</p>
</div>

<div class="col-md-4 mb-4">
<div class="counter" data-target="5">0</div>
<p>Years Experience</p>
</div>

</div>
</div>

</section>

<!-- GALLERY MODAL -->

<div id="galleryModal"
class="fixed inset-0 z-[110] hidden pro-modal animate__animated animate__fadeIn">

<button onclick="closeGallery()"
class="absolute top-5 right-6 text-white text-5xl">×</button>

<div class="h-full flex flex-col items-center justify-center p-4">

<img id="mainSlide"
class="w-full max-w-5xl h-[70vh] object-contain rounded-2xl shadow-2xl">

<div id="thumbContainer"
class="mt-6 flex gap-3 overflow-x-auto max-w-5xl p-3"></div>

</div>
</div>

<!-- GLOBAL FLOATING PANEL -->

<div class="global-floating">

<button onclick="openGallery()"
class="bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-full shadow-xl">
📷
</button>

<button onclick="toggleTheme()"
class="bg-purple-600 hover:bg-purple-700 text-white p-4 rounded-full shadow-xl">
🌙
</button>

<a href="https://wa.me/923XXXXXXXXX"
class="bg-green-600 hover:bg-green-700 text-white p-4 rounded-full shadow-xl">
<i class="fab fa-whatsapp"></i>
</a>

</div>

<!-- Scripts -->

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>

/* Gallery Images */

const galleryImages=[
"IMG-20260222-WA0024.jpg",
"IMG-20260222-WA0028.jpg",
"IMG-20260223-WA0055.jpg",
"IMG-20260224-WA0019.jpg",
"IMG-20260225-WA0028.jpg",
"IMG-20260228-WA0039.jpg",
"IMG-20260301-WA0097.jpg",
"IMG_20260218_015819.png",
"file_0000000062b871faad20fb22.jpg",
"file_00000000c9e07208a96c20c.jpg"
];

let currentIdx=0;
let autoPlay;

/* Gallery Engine */

function openGallery(){
document.getElementById("galleryModal").classList.remove("hidden");
document.body.style.overflow="hidden";

renderGallery();
startAutoPlay();
}

function closeGallery(){
document.getElementById("galleryModal").classList.add("hidden");
document.body.style.overflow="auto";

clearInterval(autoPlay);
}

function renderGallery(){

const container=document.getElementById("thumbContainer");

container.innerHTML=galleryImages.map((img,i)=>
`<img src="${img}"
onclick="selectImage(${i})"
class="h-16 min-w-[100px] object-cover rounded-lg cursor-pointer transition-all
${i===currentIdx?'border-2 border-green-400 scale-110':'opacity-50 hover:opacity-100'}">`
).join('');

document.getElementById("mainSlide").src=galleryImages[currentIdx];

}

function selectImage(i){
currentIdx=i;
renderGallery();
clearInterval(autoPlay);
startAutoPlay();
}

function startAutoPlay(){
autoPlay=setInterval(()=>{
currentIdx=(currentIdx+1)%galleryImages.length;
renderGallery();
},5000);
}

/* Theme Memory */

function toggleTheme(){

document.body.classList.toggle("light-mode");

let mode=document.body.classList.contains("light-mode")?"light":"dark";

localStorage.setItem("theme",mode);

if(mode==="light"){
document.body.style.background="#f4f4f4";
document.body.style.color="#111";
}else{
document.body.style.background="#0f172a";
document.body.style.color="white";
}

}

/* Clock Widget */

setInterval(()=>{
let clock=document.getElementById("clock");
if(clock) clock.innerText=new Date().toLocaleTimeString();
},1000);

/* Particle Background */

particlesJS("particles-js",{
particles:{
number:{value:70},
color:{value:"#25D366"},
shape:{type:"circle"},
opacity:{value:0.5},
size:{value:3},
move:{enable:true,speed:2}
},
interactivity:{
events:{
onhover:{enable:true,mode:"repulse"}
}
}
});

/* Page Load Theme Memory */

window.onload=function(){

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light-mode");
document.body.style.background="#f4f4f4";
document.body.style.color="#111";
}

};

</script>

</body>
  </html>
