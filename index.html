<style>

/* ================= GLOBAL STYLE ================= */

html{
scroll-behavior:smooth;
}

body{
font-family:Segoe UI,sans-serif;

color:white;

/* ⭐ STAR BRAND GLOW */

animation:starGlow 2s infinite alternate;
}

@keyframes starGlow{
0%{text-shadow:0 0 5px gold;}
100%{text-shadow:0 0 25px gold;}
}

/* Gradient Heading */

.gradient-text{
background:linear-gradient(45deg,#25D366,#00f2fe,#ff00ff);
background-size:200% 200%;
-webkit-background-clip:text;
color:transparent;
animation:gradientMove 4s infinite alternate;
}

@keyframes gradientMove{
0%{background-position:left}
100%{background-position:right}
}

/* Floating Panel */

.global-floating{
position:fixed;
bottom:30px;
right:25px;
z-index:9999;
display:flex;
flex-direction:column;
gap:18px;
}

/* Gallery Modal */

.pro-modal{
background:rgba(0,0,0,.96);
backdrop-filter:blur(25px);
}

/* Thumb */

.thumb-active{
border:2px solid #25D366!important;
transform:scale(1.15);
}

/* Light Mode */

.light-mode{
background:#f4f4f4!important;
color:#111!important;
}

/* Navbar */

.navbar-custom{
background:rgba(0,0,0,0.7);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.navbar-brand{

}

.navbar-brand span{

}

/* Business Glass Card */

background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border-radius:30px;
padding:50px;
border:1px solid rgba(255,255,255,0.1);
}

/* Counter */

.counter{
font-size:48px;
font-weight:bold;
color:#25D366;
}

.live-dot{
width:12px;
height:12px;
background:#ff4d4d;
border-radius:50%;
animation:blink 1.2s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

</style>

</head>

<!-- ================= GALLERY MODAL ================= -->

<div id="galleryModal"
class="fixed inset-0 z-[110] hidden pro-modal animate__animated animate__fadeIn">

📷
</button>

🌙
</button>

</a>

<!-- ================= SCRIPTS ================= -->

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>

/* Gallery Engine */

const galleryImages=[
"IMG-20260222-WA0024.jpg",
"IMG-20260222-WA0028.jpg",
"IMG-20260223-WA0055.jpg",
"IMG-20260224-WA0019.jpg",
"IMG-20260225-WA0028.jpg",
"IMG-20260228-WA0039.jpg",
"IMG-20260301-WA0097.jpg",
"IMG_20260218_015819.png",
"file_0000000062b871faad20fb22.jpg",
"file_00000000c9e07208a96c20c.jpg"
];

let currentIdx=0;
let autoPlay;

/* Open Gallery */

function openGallery(){
document.getElementById("galleryModal").classList.remove("hidden");
document.body.style.overflow="hidden";
renderGallery();
startAutoPlay();
}

function closeGallery(){
document.getElementById("galleryModal").classList.add("hidden");
document.body.style.overflow="auto";
clearInterval(autoPlay);
}

function renderGallery(){

const container=document.getElementById("thumbContainer");

container.innerHTML=galleryImages.map((img,i)=>
`<img src="${img}"
onclick="selectImage(${i})"
class="h-16 min-w-[100px] object-cover rounded-lg cursor-pointer transition-all
${i===currentIdx?'thumb-active':'opacity-50 hover:opacity-100'}">`
).join('');

document.getElementById("mainSlide").src=galleryImages[currentIdx];

}

function selectImage(i){
currentIdx=i;
renderGallery();
clearInterval(autoPlay);
startAutoPlay();
}

function startAutoPlay(){
autoPlay=setInterval(()=>{
currentIdx=(currentIdx+1)%galleryImages.length;
renderGallery();
},5000);
}

/* Theme Memory */

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light-mode");
}

function toggleTheme(){
document.body.classList.toggle("light-mode");

localStorage.setItem(
"theme",
document.body.classList.contains("light-mode")?"light":"dark"
);
}

/* Clock Widget */

setInterval(()=>{
let clock=document.getElementById("clock");
if(clock) clock.innerText=new Date().toLocaleTimeString();
},1000);

/* Particle Background */

particlesJS("particles-js",{
particles:{
number:{value:80},
color:{value:"#25D366"},
move:{speed:2}
}
});

</script>
