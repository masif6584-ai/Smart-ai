        @keyframes starPulse {

        }

        /* --- Navbar Upgrade --- */

            backdrop-filter: blur(20px);

            padding: 12px 0;

        .nav-link {
            font-weight: 600;
            margin: 0 8px;
            transition: 0.3s;
            text-transform: uppercase;

        /* --- Hero Section --- */
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding-top: 80px; }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        /* --- Live Clock Design --- */
        #clock-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            color: var(--primary-color);
            text-shadow: 0 0 15px var(--primary-color);
            background: rgba(0,0,0,0.4);
            padding: 15px 35px;
            border-radius: 100px;
            border: 2px solid var(--primary-color);
            display: inline-block;
            margin-bottom: 25px;
        }

        /* --- Counter Style --- */
        .counter-box {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 25px;
            transition: 0.4s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .counter-box:hover { border-color: var(--primary-color); transform: translateY(-10px); background: rgba(37, 211, 102, 0.05); }
        .counter-val { font-size: 3.2rem; font-weight: 800; color: var(--primary-color); text-shadow: var(--accent-glow); }

        /* --- Gallery SlideShow Engine --- */
        .gallery-wrapper {
            max-width: 900px;
            margin: 40px auto;
            border-radius: 25px;
            overflow: hidden;
            border: 4px solid rgba(255,255,255,0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
        }
        .carousel-item img { height: 500px; object-fit: cover; filter: brightness(0.9); transition: 0.5s; }
        .carousel-item:hover img { filter: brightness(1.1); transform: scale(1.02); }

        /* --- Floating WhatsApp --- */
        .wa-float {
            position: fixed;
            bottom: 35px;
            right: 35px;
            width: 70px;
            height: 70px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: white;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.5);
            z-index: 1000;
            animation: pulseWA 2s infinite;
            text-decoration: none;
        }
        @keyframes pulseWA {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            #clock-display { font-size: 1.8rem; padding: 10px 25px; }
            .carousel-item img { height: 300px; }
            .counter-val { font-size: 2.5rem; }
        }
    </style>

<script type="module">

  apiKey: "AIzaSyC11_tDLArVyx5D4Uj9ZWgUdjnHkbcN7DU",
  authDomain: "live-counter-cd83d.firebaseapp.com",
  databaseURL: "https://live-counter-cd83d-default-rtdb.asia-southeast1.firebasedatabase.app", 
  projectId: "live-counter-cd83d",
  storageBucket: "live-counter-cd83d.firebasestorage.app",
  messagingSenderId: "1026920002807",
  appId: "1:1026920002807:web:b9778389850cdcf1e88ff2",
  measurementId: "G-NBJ3BTK6GG"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
const statsRef = ref(database, 'stats');

update(statsRef, { count: increment(1) });
onValue(statsRef, (snapshot) => {
  const data = snapshot.val();
  if (data) document.querySelector('.visitors').innerText = data.count;
});
</script>

<script>
    AOS.init({ duration: 1000, once: true });

    // 1. Ultra Smooth Particles
    particlesJS("particles-js", {
        particles: {
            number: { value: 120, density: { enable: true, value_area: 800 } },
            color: { value: "#25D366" },
            opacity: { value: 0.2 },
            size: { value: 2 },
            move: { speed: 1.2 },
            line_linked: { enable: true, color: "#25D366", opacity: 0.1 }
        },
        interactivity: { events: { onhover: { enable: true, mode: "grab" } } }
    });

    // 2. Live Wall Clock
    function startTime() {
        const today = new Date();
        document.getElementById('clock-display').innerHTML = today.toLocaleTimeString('en-GB');
        setTimeout(startTime, 1000);
    }
    startTime();

    // 3. Counter Animation
    const counters = document.querySelectorAll('.counter-val:not(.visitors)');
    counters.forEach(c => {
        const target = +c.getAttribute('data-target');
        let count = 0;
        const speed = 40;
        const update = () => {
            const inc = target / speed;
            if(count < target) {
                count += inc;
                c.innerText = Math.ceil(count);
                setTimeout(update, 30);
            } else c.innerText = target;
        };
        update();
    });
</script>
